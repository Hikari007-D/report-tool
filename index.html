<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="./" />
    <meta
      name="description"
      content="เครื่องมือสร้างรีพอร์ตงานอัตโนมัติ สำหรับบันทึกและจัดการรายงานการทำงานประจำวัน"
    />
    <meta
      name="keywords"
      content="report generator, รายงาน, work report, BOM"
    />
    <meta name="author" content="Report Generator Team" />

    <title>ตัวสร้างรีพอร์ต | Report Generator</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <!-- Skip to content for accessibility -->
    <a href="#main-content" class="skip-to-content">ข้ามไปยังเนื้อหา</a>

    <div class="container" id="main-content">
      <!--Header Buttons -->
      <div class="header-buttons">
        <button
          class="icon-round-btn"
          id="historyBtn"
          title="ประวัติรีพอร์ต"
          aria-label="เปิดประวัติรีพอร์ต"
        >
          📜
        </button>
        <button
          class="icon-round-btn"
          id="themeToggle"
          title="เปลี่ยนโหมดมืด/สว่าง"
          aria-label="สลับโหมดมืด/สว่าง"
        >
          🌓
        </button>
      </div>

      <h1>📝 เครื่องมือสร้างรีพอร์ต</h1>

      <!-- Report Date -->
      <div class="form-group">
        <label for="reportDate">📅 รายงานวันที่</label>
        <input type="date" id="reportDate" />
      </div>

      <!-- Work BOM Input -->
      <div class="form-group">
        <label for="workBom">🔖 Work BOM</label>
        <input type="text" id="workBom" placeholder="ระบุ Work BOM" />
      </div>

      <!-- Project Name Input -->
      <div class="form-group">
        <label for="projectName">🏷️ ชื่อ Project</label>
        <input
          type="text"
          id="projectName"
          placeholder="PROJECT MACHINE WASHING SOLENOID 1W ( MC.1 )"
          maxlength="200"
        />
      </div>

      <!-- Remark Options Datalist -->
      <datalist id="remarkOptions">
        <option value="รอเทสช่วงบ่าย"></option>
        <option value="ติดตั้งเสร็จสิ้น"></option>
        <option value="แก้ไขเรียบร้อย"></option>
        <option value="เจอปัญหาหน้างาน"></option>
        <option value="ระบบขัดข้อง"></option>
        <option value="รอคำตอบจากลูกค้า"></option>
        <option value="กำลังดำเนินการ"></option>
      </datalist>

      <!-- Task List Section -->
      <div class="form-group">
        <label>🟢 รายละเอียดงาน (<span id="taskCount">0</span> รายการ)</label>
        <small class="hint-text">
          เลือก Status = OK → แสดงเป็น ✅ สำเร็จ / NG → แสดงเป็น ❌ ไม่สำเร็จ
        </small>

        <!-- Task List Container -->
        <div id="task-list" role="list" aria-label="รายการงาน"></div>

        <!-- Add Task Button -->
        <button
          type="button"
          id="addTaskButton"
          aria-label="เพิ่มรายการงานใหม่"
        >
          ➕ เพิ่มรายการงาน
        </button>
      </div>

      <!-- Tomorrow Plans Section -->
      <div class="form-group">
        <label>🔵 แผนงานของวันพรุ่งนี้ (<span id="planCount">0</span> รายการ)</label>
        <div id="plan-list" role="list" aria-label="แผนงานพรุ่งนี้"></div>
        <button type="button" id="addPlanButton" class="add-line-btn">
          ➕ เพิ่มแผนงาน
        </button>
      </div>

      <!-- Problems Section (paired list) -->
      <div class="form-group">
        <label>🔴 แจ้งปัญหา และทางเลือกในการแก้ไข (<span id="problemCount">0</span> รายการ)</label>
        <div id="problem-list" role="list" aria-label="รายการปัญหา"></div>
        <button type="button" id="addProblemButton" class="add-line-btn">
          ➕ เพิ่มปัญหา
        </button>
      </div>

      <!-- Notes Section -->
      <div class="form-group">
        <label for="helpNeeded">📋 ต้องการความช่วยเหลือ</label>
        <textarea
          id="helpNeeded"
          rows="3"
          placeholder="เช่น จัดหาวัสดุอุปกรณ์, ขอกำลังคนเพิ่ม (เว้นว่างได้)"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="suggestions">💡 ข้อเสนอแนะ</label>
        <textarea
          id="suggestions"
          rows="3"
          placeholder="ข้อเสนอแนะต่าง ๆ (เว้นว่างได้)"
        ></textarea>
      </div>

      <!-- Copy Button -->
      <button id="copyButton" aria-label="สร้างและคัดลอกรีพอร์ต">
        📋 สร้างและคัดลอก (Generate &amp; Copy)
      </button>

      <!-- Share / Export Buttons -->
      <div class="action-buttons" style="margin-top: 8px">
        <button id="shareLineBtn" class="secondary-btn" aria-label="แชร์ไปยัง LINE">
          💬 แชร์ LINE
        </button>
        <button id="exportMdBtn" class="secondary-btn" aria-label="บันทึกเป็น Markdown">
          📝 Save .md
        </button>
        <button id="printBtn" class="secondary-btn" aria-label="พิมพ์/บันทึก PDF">
          🖨️ Print/PDF
        </button>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons" style="margin-top: 8px">
        <button
          id="clearTasksBtn"
          class="secondary-btn"
          aria-label="ล้างเฉพาะรายการงาน"
        >
          🧹 ล้างเฉพาะงาน
        </button>
        <button
          id="resetAllBtn"
          class="secondary-btn"
          aria-label="ล้างข้อมูลทั้งหมด"
        >
          🗑️ ล้างทั้งหมด
        </button>
      </div>

      <!-- Export/Import Buttons -->
      <div class="action-buttons" style="margin-top: 8px">
        <button id="exportBtn" class="secondary-btn" aria-label="ส่งออกข้อมูล JSON">
          📥 Export JSON
        </button>
        <button id="importBtn" class="secondary-btn" aria-label="นำเข้าข้อมูล JSON">
          📤 Import JSON
        </button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>

      <!-- Output Preview -->
      <div class="form-group">
        <label for="output">ตัวอย่างรีพอร์ตที่จะคัดลอก:</label>
        <textarea
          id="output"
          rows="16"
          readonly
          aria-label="ตัวอย่างรีพอร์ต"
        ></textarea>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div
      id="confirmModal"
      class="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalDesc"
      aria-hidden="true"
    >
      <div class="modal-content">
        <span class="modal-icon" id="confirmIcon" aria-hidden="true">⚠️</span>
        <div class="modal-title" id="modalTitle">ยืนยัน?</div>
        <div class="modal-desc" id="modalDesc">รายละเอียด...</div>
        <div class="modal-buttons">
          <button id="cancelModalBtn" class="btn-cancel" aria-label="ยกเลิก">
            ยกเลิก
          </button>
          <button id="confirmModalBtn" class="btn-confirm" aria-label="ยืนยัน">
            ยืนยัน
          </button>
        </div>
      </div>
    </div>

    <!-- History Modal -->
    <div
      id="historyModal"
      class="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="historyModalTitle"
      aria-hidden="true"
    >
      <div class="modal-content">
        <div class="modal-title" id="historyModalTitle">📜 ประวัติรีพอร์ต</div>
        <div class="modal-subtitle">คลิกเพื่อโหลดข้อมูลเก่ากลับมาแก้ไข</div>
        <div
          id="historyList"
          role="list"
          aria-label="รายการประวัติรีพอร์ต"
        ></div>
        <button id="closeHistoryBtn" class="btn-close" aria-label="ปิดหน้าต่าง">
          ปิดหน้าต่าง
        </button>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" role="alert" aria-live="polite" aria-atomic="true">
      ✅ คัดลอกเรียบร้อยพร้อมวาง!
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
